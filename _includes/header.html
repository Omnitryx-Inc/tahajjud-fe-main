<header>
    <nav>
        <div class="logo"><a href="/" style="text-decoration: none; color: var(--text-dark);">The Power of Tahajjud</a></div>

        <!-- Desktop links (inside header, unaffected by overlay) -->
        <div class="nav-desktop">
            <a href="/blog/" class="nav-link">Blog</a>
            <a href="/share-your-story/" class="nav-link">Share Your Story</a>
            <a href="/support-the-mission/" class="nav-link">Support the Mission</a>
            <a href="#purchase" class="nav-cta">Buy the Book</a>
        </div>

        <!-- Mobile hamburger button -->
        <button class="nav-hamburger" id="navToggle" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>
</header>

<!-- Fullscreen mobile overlay — outside <header> to avoid backdrop-filter containment -->
<div class="nav-menu" id="navMenu">
    <a href="/blog/" class="nav-link">Blog</a>
    <a href="/share-your-story/" class="nav-link">Share Your Story</a>
    <a href="/support-the-mission/" class="nav-link">Support the Mission</a>
    <a href="#purchase" class="nav-cta">Buy the Book</a>
</div>

<script>
    (function() {
        var btn = document.getElementById('navToggle');
        var menu = document.getElementById('navMenu');
        btn.addEventListener('click', function() {
            var open = menu.classList.toggle('nav-menu--open');
            btn.setAttribute('aria-expanded', open);
            btn.classList.toggle('nav-hamburger--open', open);
            document.body.classList.toggle('nav-open', open);
        });
        menu.querySelectorAll('a').forEach(function(link) {
            link.addEventListener('click', function() {
                menu.classList.remove('nav-menu--open');
                btn.classList.remove('nav-hamburger--open');
                btn.setAttribute('aria-expanded', false);
                document.body.classList.remove('nav-open');
            });
        });
    })();
</script>
