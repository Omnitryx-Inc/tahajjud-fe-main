    function applyRule(rule) {
      document.querySelectorAll('a[href^="' + STRIPE_PREFIX + '"]').forEach(function (a) {
        if (rule.action === 'swap') {
          a.href = rule.url;
          a.target = '_blank';
          a.rel = 'noopener';
        } else if (rule.action === 'hide') {
          a.style.display = 'none';
        }
      });
    }

    function applyFreeBlock() {
      // Hide "Can't afford it?" notices and free FAQs (shared classes used site-wide)
      document.querySelectorAll('.free-copy-notice, .js-free-faq').forEach(function (el) {
        el.style.display = 'none';
      });
      // Sticky bar defaults to /get-the-book/ — keep it as-is for blocked countries
      // Hide any remaining bare /free/ links
      document.querySelectorAll('a[href="/free/"], a[href="/free"]').forEach(function (a) {
        a.closest('p') ? a.closest('p').style.display = 'none' : a.style.display = 'none';
      });
      // Redirect if currently on the free page
      var path = window.location.pathname;
      if (path === '/free/' || path === '/free') {
        window.location.replace('/');
      }
    }

    function enableFreeSticky() {
      // Sticky bar defaults to /get-the-book/ — upgrade to /free/ for allowed countries
      var stickyLink = document.getElementById('sticky-bar-link');
      if (stickyLink) {
        stickyLink.href = '/free/';
        stickyLink.textContent = 'Get the Book Free';
      }
    }

    var cached = sessionStorage.getItem(CACHE_KEY);
    if (cached !== null) {
      if (RULES[cached]) applyRule(RULES[cached]);
      if (FREE_BLOCK[cached]) applyFreeBlock();
      else enableFreeSticky();
      return;
    }

    fetch('https://ipapi.co/country/')
      .then(function (r) { return r.text(); })
      .then(function (country) {
        country = country.trim();
        sessionStorage.setItem(CACHE_KEY, country);
        if (RULES[country]) applyRule(RULES[country]);
        if (FREE_BLOCK[country]) applyFreeBlock();
        else enableFreeSticky();
      })
      .catch(function () {
        // On API failure, default to enabling free (safe fallback)
        enableFreeSticky();
      });
