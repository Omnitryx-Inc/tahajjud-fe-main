  <!-- Geo-based Stripe link rules -->
  <script>
  (function () {
    var STRIPE_PREFIX = 'https://buy.stripe.com/';
    var CACHE_KEY = 'visitor_country';

    // ── Rules ────────────────────────────────────────────────────────────────
    // action: 'swap'   → replace Stripe link with the given URL
    // action: 'hide'   → hide the link from the page entirely
    // ─────────────────────────────────────────────────────────────────────────
    var HIDE = { action: 'hide' };
    var GOOGLE_PLAY = { action: 'swap', url: '{{ site.google_play_url }}' };

    var RULES = {
      // Swap to local alternative
      'IN': { action: 'swap', url: 'https://www.amazon.in/dp/B0GGY91C71' },

      // Add swap examples:
      // 'PK': { action: 'swap', url: 'https://example.com/your-link' },
      // 'BD': { action: 'swap', url: 'https://example.com/your-link' },

      // Africa — redirect to Google Play Books due to high fraud rates
      'NG': GOOGLE_PLAY, 'GH': GOOGLE_PLAY, 'CM': GOOGLE_PLAY, 'CI': GOOGLE_PLAY, 'SN': GOOGLE_PLAY,
      'ML': GOOGLE_PLAY, 'BJ': GOOGLE_PLAY, 'TG': GOOGLE_PLAY, 'NE': GOOGLE_PLAY, 'BF': GOOGLE_PLAY,
      'GN': GOOGLE_PLAY, 'GW': GOOGLE_PLAY, 'MR': GOOGLE_PLAY, 'LR': GOOGLE_PLAY, 'SL': GOOGLE_PLAY,
      'CF': GOOGLE_PLAY, 'TD': GOOGLE_PLAY, 'CG': GOOGLE_PLAY, 'CD': GOOGLE_PLAY, 'GA': GOOGLE_PLAY,
      'GQ': GOOGLE_PLAY, 'ST': GOOGLE_PLAY, 'AO': GOOGLE_PLAY, 'ZM': GOOGLE_PLAY, 'ZW': GOOGLE_PLAY,
      'MZ': GOOGLE_PLAY, 'MW': GOOGLE_PLAY, 'TZ': GOOGLE_PLAY, 'UG': GOOGLE_PLAY, 'RW': GOOGLE_PLAY,
      'BI': GOOGLE_PLAY, 'KE': GOOGLE_PLAY, 'ET': GOOGLE_PLAY, 'SO': GOOGLE_PLAY, 'SD': GOOGLE_PLAY,
      'SS': GOOGLE_PLAY, 'ER': GOOGLE_PLAY, 'DJ': GOOGLE_PLAY, 'KM': GOOGLE_PLAY, 'MG': GOOGLE_PLAY,
      'MU': GOOGLE_PLAY, 'SC': GOOGLE_PLAY, 'LS': GOOGLE_PLAY, 'SZ': GOOGLE_PLAY, 'BW': GOOGLE_PLAY,
      'NA': GOOGLE_PLAY, 'ZA': GOOGLE_PLAY, 'DZ': GOOGLE_PLAY, 'MA': GOOGLE_PLAY, 'TN': GOOGLE_PLAY,
      'LY': GOOGLE_PLAY, 'EG': GOOGLE_PLAY, 'CV': GOOGLE_PLAY, 'GM': GOOGLE_PLAY,
    };

    function applyRule(rule) {
      document.querySelectorAll('a[href^="' + STRIPE_PREFIX + '"]').forEach(function (a) {
        if (rule.action === 'swap') {
          a.href = rule.url;
          a.target = '_blank';
          a.rel = 'noopener';
        } else if (rule.action === 'hide') {
          a.style.display = 'none';
        }
      });
    }

    var cached = sessionStorage.getItem(CACHE_KEY);
    if (cached !== null) {
      if (RULES[cached]) applyRule(RULES[cached]);
      return;
    }

    fetch('https://ipapi.co/country/')
      .then(function (r) { return r.text(); })
      .then(function (country) {
        country = country.trim();
        sessionStorage.setItem(CACHE_KEY, country);
        if (RULES[country]) applyRule(RULES[country]);
      })
      .catch(function () {});
  })();
  </script>
